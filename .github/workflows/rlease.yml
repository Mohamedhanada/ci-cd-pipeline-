on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.
    
name : Release

jobs:
  release:
    name: Release    
    runs_on: ubuntu_20.04
    env: 
      DOCKER_REBO: moha983/release_go
    steps:
      - uses: actions/checkout@v6
      - name: Docker Login
        env:
          DOCKER_USERNAME: moha983
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Build and Push Docker Image
        run: |
          VERSION=${GITHUB_REF##*/}          
          docker build -t moha983/myapp:$VERSION .
          docker push moha983/myapp:$VERSION      
