name: Integration

on: push

jobs:
  build:
    # runs-on: windows-latest      # هنعمل حاجه جديدة وهي ان اعمل تيست للجو اب علي اكتر من نظام تشغيل 
    # وهي ين استخدم ال matrix عشان اعمل تيست علي اكتر من نظام تشغيل   
    # وكمان اقدر اسنخدم اكتر من فيرجن للجو 
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]  
        go_version: ['1.26.4']  # هنا هعمل تيست علي اكتر من فيرجن للجو
    runs_on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version }}
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
        run: |
          go build ./...
          echo "Build completed successfully."
          echo "Go version: $(go version)"
          echo" Operating System: $(go_version)"

      - name: Run Tests
        run: |
          go test ./...

# هنا هعمل خطوة جديدة وهي اني اعمل تست  لملف الدوكر واعمل تست للايمج بتاعتوا 

  docker-test:
    runs-on: ubuntu-latest
    needs: [build]  #دي عشان اقولوا ان الخطوة دي محتاجة الخطوة اللي فوقها تخلص الاول 
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker Image
        run: |
          docker build .

