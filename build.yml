name: Integration

on: push

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23.13'
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
        run: |
          go build ./...

      - name: Run Tests
        run: |
          go test ./...

